<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>현충일 졔 벙🔥</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e14;
      --card: #101822;
      --border: #1e3347;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #e11d48;
      --ok: #22c55e;
      --wait: #f59e0b;
      --bad: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 40px;
      line-height: 1.5;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 32px; }
    .hero {
      position: relative;
      height: 240px;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.75) contrast(1.1);
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(10,14,20,0.1), rgba(10,14,20,0.85) 70%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 32px 28px;
    }
    .hero h1 {
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 900;
      letter-spacing: -1.2px;
      margin-bottom: 8px;
      text-shadow: 0 3px 12px rgba(0,0,0,0.7);
    }
    .hero .sub {
      font-size: 16px;
      color: #e2e8f0;
      opacity: 0.95;
      font-weight: 500;
      line-height: 1.45;
    }
    .grid {
      display: grid;
      gap: 24px;
    }
    @media (min-width: 960px) {
      .grid { grid-template-columns: 420px 1fr; }
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
    }
    .section-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .section-desc { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    form { display: grid; gap: 16px; }
    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
    }
    input, select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(15,23,42,0.6);
      color: var(--text);
      font-size: 15px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .two-cols {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 500px) {
      .two-cols { grid-template-columns: 1fr 1fr; }
    }
    .btn {
      appearance: none;
      border: none;
      padding: 14px 24px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, #c026d3 100%);
      color: white;
    }
    .btn-secondary {
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.4);
      color: #93c5fd;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }
    .pill-sync-ok {
      background: rgba(34,197,94,0.15);
      color: #86efac;
      border: 1px solid rgba(34,197,94,0.4);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin-top: 16px;
    }
    th {
      text-align: left;
      padding: 12px 14px;
      color: #cbd5e1;
      font-weight: 600;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      background: rgba(15,23,42,0.4);
    }
    td { padding: 14px; border-bottom: 1px solid var(--border); }
    tr:nth-child(even) { background: rgba(15,23,42,0.2); }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 13px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .s-ok .dot { background: var(--ok); }
    .s-ok { color: #86efac; }
    .s-wait .dot { background: var(--wait); }
    .s-wait { color: #fde047; }
    .s-bad .dot { background: var(--bad); }
    .s-bad { color: #fca5a5; }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 24px;
      border-radius: 14px;
      background: rgba(15,23,42,0.95);
      border: 1px solid var(--border);
      color: var(--text);
      z-index: 100;
      opacity: 0;
      transition: 0.2s;
    }
    .toast.show { opacity: 1; }
    .hint {
      font-size: 13px;
      color: var(--muted);
      margin-top: 12px;
      line-height: 1.6;
    }
    .meta-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="hero">
      <img src="https://github.com/yoon-zip/JH_0606/blob/main/1.png?raw=true" alt="배드민턴 코트" />
      <div class="hero-overlay">
        <h1>제 1회 졔 벙🔥</h1>
        <div class="sub">
          장소: 경기 광주 레디민턴(직동 138), 시간 10:00~13:00<br>
          (D조 이상, 셔틀콕 남3&여2)
        </div>
      </div>
    </div>
    <div class="meta-row">
      <span class="pill pill-sync-ok" id="syncPill">⏳ 동기화 준비 중…</span>
      <button class="btn btn-secondary" id="refreshBtn" type="button">새로고침</button>
    </div>
  </header>

  <div class="grid">
    <!-- 신청 -->
    <section class="card">
      <div class="section-title">참가 신청</div>
      <div class="section-desc">입력 즉시 “대기 중”으로 등록됩니다</div>
      <form id="applyForm">
        <div>
          <label for="name">이름</label>
          <input id="name" name="name" placeholder="예: 임지혜" required maxlength="30" />
        </div>
        
        <div class="two-cols">
          <div>
            <label for="ageGroup">나이대</label>
            <select id="ageGroup" name="ageGroup" required>
              <option value="" disabled selected>선택하세요</option>
              <option>20대</option>
              <option>30대</option>
              <option>40대</option>
              <option>50대</option>
              <option>60대↑</option>
              <option>기타</option>
            </select>
          </div>
          <div>
            <label for="gender">성별</label>
            <select id="gender" name="gender" required>
              <option value="" disabled selected>선택하세요</option>
              <option>여</option>
              <option>남</option>
              <option>기타</option>
              <option>비공개</option>
            </select>
          </div>
        </div>

        <div class="two-cols">
          <div>
            <label for="level">급수</label>
            <select id="level" name="level" required>
              <option value="" disabled selected>선택하세요</option>
              <option>초심</option>
              <option>D</option>
              <option>C</option>
              <option>B</option>
              <option>A</option>
              <option>상관없음</option>
            </select>
          </div>
          <div>
            <label for="date">참가 날짜</label>
            <input type="date" id="date" name="date" required />
          </div>
        </div>

        <button class="btn btn-primary" type="submit" id="submitBtn">
          신청하기
        </button>
      </form>

      <div class="hint">
        ※ 신청 후 입금이 확인되면 ‘대기’에서 ‘참가’로 변경됩니다.<br>
        토스뱅크 1000-6608-8318 (임지혜) <br>
        참가비 10,000원
      </div>
      <div class="toast" id="toast"></div>
    </section>

    <!-- 명단 -->
    <section class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:20px;">
        <div>
          <div class="section-title">참가 명단</div>
          <div id="countText" style="color:var(--muted); font-size:14px;">0명</div>
        </div>
        <div>
          <span class="pill pill-sync-ok" id="autoPill">🔄 자동 갱신 중</span>
        </div>
      </div>

      <div id="waitlistContent">
        <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px;">
          <input id="search" placeholder="이름 · 급수 · 나이대 검색" style="flex:1; min-width:180px;" />
          <select id="filterStatus">
            <option value="all" selected>전체 상태</option>
            <option value="대기">대기만</option>
            <option value="참가">참가만</option>
          </select>
          <select id="sortBy">
            <option value="time_desc" selected>최신 신청순</option>
            <option value="time_asc">오래된순</option>
            <option value="name_asc">이름순</option>
          </select>
        </div>
        <table>
          <thead>
            <tr>
              <th style="width:100px;">상태</th>
              <th>이름</th>
              <th style="width:80px;">나이대</th>
              <th style="width:90px;">급수</th>
              <th style="width:110px;">날짜</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="5" style="text-align:center; padding:40px; color:var(--muted);">
                명단 불러오는 중…
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</div>

<footer class="footer-cta" style="max-width:1100px;margin:22px auto 0;padding:18px 16px;text-align:center;color:var(--muted);border-top:1px solid rgba(148,163,184,0.18);">
  <div style="font-weight:900;color:#e2e8f0;margin-bottom:6px;font-size:15px;">번개 모임, 페이지 하나로 간편하게 관리해 보세요!</div>
  <a href="https://instagram.com/yoondminton" target="_blank" style="display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:999px;text-decoration:none;font-weight:800;font-size:14px;border:1px solid rgba(225,29,72,0.45);background:rgba(225,29,72,0.12);color:#fecdd3;">
    문의 👉 @yoondminton
  </a>
</footer>

<script>
window.onerror = function(msg, src, line) {
  alert(msg + " @line:" + line);
};

const CONFIG = {
  API_BASE: "https://script.google.com/macros/s/AKfycbwJa7ly42IblV7YUwNYiFmCkGRj_zUk_Zv8s-iwg1KT12FcNnY3DjYPre27w7HO3birQg/exec",
  POLL_MS: 10000,
};

const $ = (id) => document.getElementById(id);
let allItems = [];
let pollTimer = null;

function escapeHtml(str) {
  return String(str ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function toast(msg, kind = "info") {
  const el = $("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove("show"), 3000);
}

function setPill(text, ok = true) {
  const pill = $("syncPill");
  pill.textContent = text;
  pill.className = "pill " + (ok ? "pill-sync-ok" : "pill-sync-err");
}

function statusChip(statusRaw) {
  const status = (statusRaw || "대기").trim();
  if (status === "참가") return `<span class="status s-ok"><span class="dot"></span>참가</span>`;
  if (status === "불참" || status === "취소") return `<span class="status s-bad"><span class="dot"></span>${escapeHtml(status)}</span>`;
  return `<span class="status s-wait"><span class="dot"></span>대기</span>`;
}

function jsonp(url, timeout = 10000) {
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Math.random().toString(36).slice(2);
    const s = document.createElement("script");
    const timer = setTimeout(() => { cleanup(); reject(new Error("요청 시간 초과")); }, timeout);

    const u = new URL(url);
    u.searchParams.set("callback", cb);
    u.searchParams.set("_t", Date.now());

    window[cb] = (data) => { cleanup(); resolve(data); };

    function cleanup() {
      clearTimeout(timer);
      try { delete window[cb]; } catch {}
      if (s.parentNode) s.parentNode.removeChild(s);
    }

    s.onerror = () => { cleanup(); reject(new Error("JSONP load failed")); };
    s.src = u.toString();
    document.head.appendChild(s);
  });
}

async function apiGetList() {
  const url = new URL(CONFIG.API_BASE);
  url.searchParams.set("action", "list");
  const data = await jsonp(url.toString());
  return data.items || [];
}

async function apiApply(payload) {
  const url = new URL(CONFIG.API_BASE);
  url.searchParams.set("action", "apply");
  Object.keys(payload).forEach(key => {
    url.searchParams.set(key, payload[key]);
  });
  const data = await jsonp(url.toString());
  return data;
}

function applyFiltersAndRender() {
  const q = $("search").value.trim().toLowerCase();
  let items = [...allItems];

  if (q) {
    items = items.filter(it => 
      `${it.name} ${it.level} ${it.ageGroup || ''}`.toLowerCase().includes(q)
    );
  }

  $("countText").textContent = `${items.length}명`;

  const tbody = $("tbody");
  if (items.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:40px;">표시할 항목이 없습니다.</td></tr>`;
    return;
  }

  tbody.innerHTML = items.map(it => `
    <tr>
      <td>${statusChip(it.status)}</td>
      <td style="font-weight:700;">${escapeHtml(it.name)}</td>
      <td>${escapeHtml(it.ageGroup || '-')}</td>
      <td>${escapeHtml(it.level)}</td>
      <td>${escapeHtml(it.date || '-')}</td>
    </tr>
  `).join("");
}

async function refreshList(showToast = false) {
  try {
    setPill("🔄 동기화 중…", true);
    const items = await apiGetList();
    allItems = items;
    applyFiltersAndRender();
    setPill("✅ 동기화 완료", true);
    if (showToast) toast("명단 새로고침 완료");
  } catch (e) {
    setPill("⚠️ 동기화 실패", false);
    toast("불러오기 실패", "bad");
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => refreshList(false), CONFIG.POLL_MS);
}

async function onSubmit(e) {
  e.preventDefault();
  const name = $("name").value.trim();
  const ageGroup = $("ageGroup").value;
  const level = $("level").value;
  const gender = $("gender").value;
  const date = $("date").value;

  if (!name || !ageGroup || !level || !gender || !date) {
    toast("모든 항목을 입력해주세요.", "bad");
    return;
  }

  $("submitBtn").disabled = true;
  $("submitBtn").textContent = "신청 중…";

  try {
    await apiApply({ name, ageGroup, level, gender, date });
    $("applyForm").reset();
    toast("신청 완료!", "ok");
    refreshList(false);
  } catch {
    toast("신청 실패", "bad");
  } finally {
    $("submitBtn").disabled = false;
    $("submitBtn").textContent = "신청하기";
  }
}

// 이벤트 연결
$("applyForm").addEventListener("submit", onSubmit);
$("refreshBtn").addEventListener("click", () => refreshList(true));
$("search").addEventListener("input", applyFiltersAndRender);

// 초기화
setTimeout(() => {
  refreshList(false);
  startPolling();
}, 300);

console.log("✅ 졔 벙 페이지 로드 완료 (날짜 + 나이대 추가 버전)");
</script>
</body>
</html>
