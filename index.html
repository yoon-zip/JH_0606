<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>원코치 벙🔥</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e14;
      --card: #101822;
      --border: #1e3347;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #e11d48;
      --ok: #22c55e;
      --wait: #f59e0b;
      --bad: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 40px;
      line-height: 1.5;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 32px; }
    .hero {
      position: relative;
      height: 240px;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
    .hero img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.75) contrast(1.1); }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(10,14,20,0.1), rgba(10,14,20,0.85) 70%);
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 32px 28px;
    }
    .hero h1 {
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 900;
      letter-spacing: -1.2px;
      margin-bottom: 8px;
      text-shadow: 0 3px 12px rgba(0,0,0,0.7);
    }
    .grid {
      display: grid;
      gap: 24px;
    }
    @media (min-width: 960px) {
      .grid { grid-template-columns: 420px 1fr; }
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    }
    .section-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .section-desc { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    form { display: grid; gap: 16px; }
    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
    }
    input, select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(15,23,42,0.6);
      color: var(--text);
      font-size: 15px;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    .two-cols {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 500px) {
      .two-cols { grid-template-columns: 1fr 1fr; }
    }
    .btn {
      appearance: none;
      border: none;
      padding: 14px 24px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, #c026d3 100%);
      color: white;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }
    .pill-sync-ok {
      background: rgba(34,197,94,0.15);
      color: #86efac;
      border: 1px solid rgba(34,197,94,0.4);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin-top: 16px;
    }
    th {
      text-align: left;
      padding: 12px 14px;
      color: #cbd5e1;
      font-weight: 600;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      background: rgba(15,23,42,0.4);
    }
    td { padding: 14px; border-bottom: 1px solid var(--border); }
    tr:nth-child(even) { background: rgba(15,23,42,0.2); }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 13px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .s-ok .dot { background: var(--ok); }
    .s-ok { color: #86efac; }
    .s-wait .dot { background: var(--wait); }
    .s-wait { color: #fde047; }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 24px;
      border-radius: 14px;
      background: rgba(15,23,42,0.95);
      border: 1px solid var(--border);
      color: var(--text);
      z-index: 100;
      opacity: 0;
      transition: 0.2s;
    }
    .toast.show { opacity: 1; }
    .hint { font-size: 13px; color: var(--muted); margin-top: 12px; line-height: 1.6; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="hero">
      <img src="https://github.com/yoon-zip/JH_0606/blob/main/1.png?raw=true" alt="배드민턴 코트" />
      <div class="hero-overlay">
        <h1>원코치 벙🔥</h1>
        <div class="sub">
          장소: 오주중학교(동남로 281), 시간: 19:00~21:00<br>
          (D조 이상, 셔틀콕 남3&여2)
        </div>
      </div>
    </div>
    <div style="text-align:center; margin-bottom:20px;">
      <span class="pill pill-sync-ok" id="syncPill">⏳ 동기화 준비 중…</span>
      <button class="btn btn-secondary" id="refreshBtn" type="button" style="margin-left:10px;">새로고침</button>
    </div>
  </header>

  <div class="grid">
    <!-- 신청 -->
    <section class="card">
      <div class="section-title">참가 신청</div>
      <div class="section-desc">입력 즉시 “대기 중”으로 등록됩니다</div>
      <form id="applyForm">
        <div>
          <label for="name">이름</label>
          <input id="name" name="name" placeholder="예: 최윤서" required maxlength="30" />
        </div>
        
        <div class="two-cols">
          <div>
            <label for="ageGroup">나이대</label>
            <select id="ageGroup" name="ageGroup" required>
              <option value="" disabled selected>선택하세요</option>
              <option>20대</option>
              <option>30대</option>
              <option>40대</option>
              <option>50대</option>
              <option>60대↑</option>
              <option>기타</option>
            </select>
          </div>
          <div>
            <label for="gender">성별</label>
            <select id="gender" name="gender" required>
              <option value="" disabled selected>선택하세요</option>
              <option>여</option>
              <option>남</option>
              <option>중성</option>
              <option>기타</option>
            </select>
          </div>
        </div>

        <div class="two-cols">
          <div>
            <label for="level">급수</label>
            <select id="level" name="level" required>
              <option value="" disabled selected>선택하세요</option>
              <option>초심</option>
              <option>D</option>
              <option>C</option>
              <option>B</option>
              <option>A</option>
              <option>상관없음</option>
            </select>
          </div>
          <div>
            <label for="date">참가 날짜</label>
            <select id="date" name="date" required>
              <option value="" disabled selected>날짜 선택</option>
              <option value="2026-06-26">6/26 (수)</option>
              <option value="2026-06-28">6/28 (금)</option>
            </select>
          </div>
        </div>

        <button class="btn btn-primary" type="submit" id="submitBtn">신청하기</button>
      </form>

      <div class="hint">
        ※ 신청 후 입금이 확인되면 ‘대기’에서 ‘참가’로 변경됩니다.<br>
        우리은행 1002-154-683994 (최윤서) <br>
        참가비 4,000원
      </div>
      <div class="toast" id="toast"></div>
    </section>

    <!-- 명단 -->
    <section class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:20px;">
        <div>
          <div class="section-title">참가 명단</div>
          <div id="countText" style="color:var(--muted); font-size:14px;">날짜를 선택해주세요</div>
        </div>
        <div>
          <select id="dateFilter" style="padding:10px 14px; border-radius:12px; background:rgba(15,23,42,0.8); color:var(--text); border:1px solid var(--border);">
            <option value="">전체 날짜</option>
            <option value="2026-06-26">6/26 (수)</option>
            <option value="2026-06-28">6/28 (금)</option>
          </select>
        </div>
      </div>

      <div id="waitlistContent">
        <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px;">
          <input id="search" placeholder="이름 · 급수 · 나이대 검색" style="flex:1; min-width:180px;" />
        </div>
        <table>
          <thead>
            <tr>
              <th style="width:100px;">상태</th>
              <th>이름</th>
              <th style="width:80px;">나이대</th>
              <th style="width:90px;">급수</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="4" style="text-align:center; padding:60px; color:var(--muted);">
                날짜를 선택하면 명단이 표시됩니다.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</div>

<script>
// ==================== 설정 ====================
const CONFIG = {
  API_BASE: "https://script.google.com/macros/s/AKfycbwJa7ly42IblV7YUwNYiFmCkGRj_zUk_Zv8s-iwg1KT12FcNnY3DjYPre27w7HO3birQg/exec",
  POLL_MS: 10000,
};

const $ = (id) => document.getElementById(id);
let allItems = [];
let pollTimer = null;

function escapeHtml(str) {
  return String(str ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
}

function toast(msg) {
  const el = $("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 3000);
}

function setPill(text, ok = true) {
  const pill = $("syncPill");
  pill.textContent = text;
  pill.className = "pill " + (ok ? "pill-sync-ok" : "pill-sync-err");
}

function statusChip(statusRaw) {
  const status = (statusRaw || "대기").trim();
  if (status === "참가") return `<span class="status s-ok"><span class="dot"></span>참가</span>`;
  if (status === "불참" || status === "취소") return `<span class="status s-bad"><span class="dot"></span>${escapeHtml(status)}</span>`;
  return `<span class="status s-wait"><span class="dot"></span>대기</span>`;
}

// JSONP 함수 (기존 유지)
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Math.random().toString(36).slice(2);
    const s = document.createElement("script");
    const u = new URL(url);
    u.searchParams.set("callback", cb);
    u.searchParams.set("_t", Date.now());

    window[cb] = (data) => {
      delete window[cb];
      if (s.parentNode) s.parentNode.removeChild(s);
      resolve(data);
    };

    s.onerror = () => reject(new Error("JSONP failed"));
    s.src = u.toString();
    document.head.appendChild(s);
  });
}

async function apiGetList() {
  const url = new URL(CONFIG.API_BASE);
  url.searchParams.set("action", "list");
  const data = await jsonp(url.toString());
  return data.items || [];
}

async function apiApply(payload) {
  const url = new URL(CONFIG.API_BASE);
  url.searchParams.set("action", "apply");
  Object.keys(payload).forEach(key => url.searchParams.set(key, payload[key]));
  return await jsonp(url.toString());
}

function filterAndRender() {
  const selectedDate = $("dateFilter").value;
  const q = $("search").value.trim().toLowerCase();

  let items = allItems;

  // 날짜 필터 (더 안전하게 처리)
  if (selectedDate) {
    items = items.filter(item => {
      const itemDate = String(item.date || "").trim();
      return itemDate === selectedDate;
    });
  }

  // 검색어 필터
  if (q) {
    items = items.filter(it => 
      `${it.name} ${it.level} ${it.ageGroup || ''}`.toLowerCase().includes(q)
    );
  }

  // 참가자 수 업데이트
  $("countText").textContent = `${items.length}명`;

  const tbody = $("tbody");
  if (items.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:60px; color:var(--muted);">표시할 참가자가 없습니다.</td></tr>`;
    return;
  }

  tbody.innerHTML = items.map(it => `
    <tr>
      <td>${statusChip(it.status)}</td>
      <td style="font-weight:700;">${escapeHtml(it.name)}</td>
      <td>${escapeHtml(it.ageGroup || '-')}</td>
      <td>${escapeHtml(it.level)}</td>
    </tr>
  `).join("");
}

  tbody.innerHTML = items.map(it => `
    <tr>
      <td>${statusChip(it.status)}</td>
      <td style="font-weight:700;">${escapeHtml(it.name)}</td>
      <td>${escapeHtml(it.ageGroup || '-')}</td>
      <td>${escapeHtml(it.level)}</td>
    </tr>
  `).join("");
}

async function refreshList() {
  try {
    setPill("🔄 동기화 중…", true);
    allItems = await apiGetList();
    filterAndRender();
    setPill("✅ 동기화 완료", true);
  } catch (e) {
    setPill("⚠️ 동기화 실패", false);
    toast("명단 불러오기 실패");
  }
}

async function onSubmit(e) {
  e.preventDefault();
  const payload = {
    name: $("name").value.trim(),
    ageGroup: $("ageGroup").value,
    level: $("level").value,
    gender: $("gender").value,
    date: $("date").value
  };

  if (!payload.name || !payload.ageGroup || !payload.level || !payload.gender || !payload.date) {
    toast("모든 항목을 입력해주세요.");
    return;
  }

  $("submitBtn").disabled = true;
  $("submitBtn").textContent = "신청 중…";

  try {
    await apiApply(payload);
    $("applyForm").reset();
    toast("신청 완료!");
    refreshList();
  } catch {
    toast("신청 실패");
  } finally {
    $("submitBtn").disabled = false;
    $("submitBtn").textContent = "신청하기";
  }
}

// 이벤트 연결
$("applyForm").addEventListener("submit", onSubmit);
$("dateFilter").addEventListener("change", filterAndRender);
$("search").addEventListener("input", filterAndRender);
$("refreshBtn").addEventListener("click", refreshList);

// 초기화
setTimeout(() => {
  refreshList();
  setInterval(() => refreshList(), CONFIG.POLL_MS);
}, 500);

console.log("✅ 졔 벙 페이지 로드 완료 (날짜 제한 버전)");
</script>
</body>
</html>
